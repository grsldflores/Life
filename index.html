<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#9E7655" />
<title>My Life Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

<style>
:root{
  --paper:#EDE6DA; --card:#FBF8F1; --ink:#4C3729; --inkSoft:#8A7561;
  --lilac:#9E7655; --lilacSoft:#D8C3A3; --lilacWash:#E8DCC6;
  --gold:#C7A37E; --goldSoft:#E3CBA6; --rose:#A85D3E; --sage:#7C6A4D; --line:#E0D5C4;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:'Nunito',system-ui,sans-serif; color:var(--ink);
  background:radial-gradient(1200px 500px at 50% -200px,var(--lilacWash),transparent),var(--paper);
}
.lh-root{max-width:540px;margin:0 auto;padding-bottom:84px;position:relative;min-height:100vh;}
h1,h2,h3{font-family:'Fraunces',Georgia,serif;font-weight:600;letter-spacing:-0.01em;margin:0;}
.muted{color:var(--inkSoft);font-size:13px;}
.empty{color:var(--inkSoft);font-size:13.5px;font-style:italic;padding:4px 2px;}

/* header */
.app-head{padding:22px 20px 8px;display:flex;align-items:center;justify-content:space-between;}
.brand{display:flex;align-items:center;gap:12px;}
.brand-mark{width:40px;height:40px;border-radius:14px;display:grid;place-items:center;color:#fff;
  background:linear-gradient(140deg,var(--lilac),var(--gold));box-shadow:0 6px 16px -6px var(--lilac);}
.brand h1{font-size:22px;line-height:1.1;}
.sync{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:700;}
.signout{background:none;border:1px solid var(--line);color:var(--inkSoft);font-family:inherit;
  font-weight:700;font-size:12px;padding:7px 12px;border-radius:11px;cursor:pointer;}
.signout:hover{background:var(--lilacWash);color:var(--ink);}

.app-body{padding:6px 18px 24px;}
.stack{display:flex;flex-direction:column;gap:16px;}

.hello{display:flex;align-items:center;gap:12px;padding:6px 2px 2px;}
.hello h2{font-size:21px;}

.verse{position:relative;text-align:center;padding:24px 22px 18px;
  background:linear-gradient(150deg,var(--card),var(--lilacWash));border:1px solid var(--line);
  border-radius:22px;box-shadow:0 10px 30px -22px var(--lilac);}
.verse .spark{color:var(--gold);margin-bottom:6px;display:inline-flex;}
.verse-text{font-family:'Fraunces',serif;font-size:18px;line-height:1.45;margin:4px 0 8px;}
.verse-ref{font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--gold);font-weight:800;}

.block{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:16px 16px 18px;
  box-shadow:0 8px 24px -20px rgba(58,46,69,.5);}
.block-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.block-head h3{font-size:15.5px;}

.banner{display:flex;align-items:center;gap:14px;padding:18px;border-radius:20px;color:#fff;}
.banner h2{font-size:19px;}
.banner .muted{color:rgba(255,255,255,.85);}
.banner svg{flex:none;}
.faith-banner{background:linear-gradient(135deg,var(--lilac),#644736);}
.balance-banner{background:linear-gradient(135deg,#B59F8C,var(--lilac));}
.money-banner{background:linear-gradient(135deg,var(--gold),var(--lilac));}

.focus-list,.habit-today,.prayer-list,.dev-list,.cat-list,.row-list,.goal-list,.habit-week{
  list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:10px;}
.focus-list li,.habit-today li{display:flex;align-items:center;gap:11px;font-size:15px;}
.focus-list li.done span,.habit-today li .done{text-decoration:line-through;color:var(--inkSoft);}
.prayer-list li.answered .plain-input{text-decoration:line-through;color:var(--inkSoft);}
.focus-list li span{flex:1;}

.check{width:24px;height:24px;border-radius:8px;border:1.8px solid var(--lilac);background:#fff;
  display:grid;place-items:center;color:#fff;cursor:pointer;flex:none;transition:all .15s;}
.ghost-x{background:none;border:none;color:var(--inkSoft);cursor:pointer;padding:4px;border-radius:8px;
  display:grid;place-items:center;}
.ghost-x:hover{background:var(--lilacWash);color:var(--ink);}
.dot{width:9px;height:9px;border-radius:50%;flex:none;}

.add-row{display:flex;gap:8px;margin-top:12px;}
.add-row input,.habit-add input,.habit-add select{flex:1;padding:10px 12px;border:1px solid var(--line);
  border-radius:12px;font-family:inherit;font-size:14px;background:#fff;color:var(--ink);}
.pill{background:var(--lilac);color:#fff;border:none;width:42px;border-radius:12px;display:grid;
  place-items:center;cursor:pointer;}
.pill:hover{filter:brightness(1.05);}

textarea,.plain-input,input,select{font-family:inherit;color:var(--ink);}
.grateful{width:100%;border:1px solid var(--line);border-radius:14px;padding:12px;font-size:14px;
  resize:vertical;background:#fff;}

.reading{display:flex;flex-direction:column;gap:12px;}
.plain-input{border:none;background:transparent;font-size:14.5px;width:100%;padding:4px 2px;
  border-bottom:1px solid transparent;}
.plain-input:focus{border-bottom-color:var(--lilac);outline:none;}
.plain-input.bold{font-weight:800;}
.reading-track{display:flex;flex-direction:column;gap:8px;}
.progress{height:10px;background:var(--lilacWash);border-radius:99px;overflow:hidden;}
.progress.thin{height:7px;}
.progress>div{height:100%;border-radius:99px;transition:width .3s;}
.reading-nums{display:flex;align-items:center;gap:8px;font-weight:800;font-size:15px;}
.reading-nums .muted{font-weight:400;}
.step{width:30px;height:30px;border-radius:9px;border:1px solid var(--line);background:#fff;font-size:18px;
  line-height:1;cursor:pointer;color:var(--lilac);}
.step:hover{background:var(--lilacWash);}

.dev-form{display:flex;flex-direction:column;gap:10px;margin-bottom:14px;}
.dev-form textarea{border:1px solid var(--line);border-radius:12px;padding:10px 12px;font-size:14px;resize:vertical;}
.primary{align-self:flex-start;background:var(--lilac);color:#fff;border:none;padding:9px 16px;border-radius:11px;
  font-weight:800;font-size:13.5px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;}
.primary:hover{filter:brightness(1.05);}
.dev-list li{background:var(--lilacWash);border-radius:13px;padding:11px 13px;}
.dev-meta{display:flex;align-items:center;gap:10px;}
.dev-ref{font-weight:800;color:var(--lilac);font-size:13.5px;flex:1;}
.dev-list p{margin:6px 0 0;font-size:14px;line-height:1.5;white-space:pre-wrap;}

.add-mini{background:var(--lilacWash);color:var(--lilac);border:none;padding:6px 11px;border-radius:10px;
  font-weight:800;font-size:12.5px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;}
.add-mini:hover{background:#e6d9f3;}
.answered-tag{display:inline-flex;align-items:center;gap:6px;background:var(--lilacWash);color:#6A4F38;padding:6px 12px;
  border-radius:99px;font-size:12.5px;font-weight:800;margin:0 0 10px;}
.prayer-list li{display:flex;gap:11px;align-items:flex-start;background:var(--paper);border:1px solid var(--line);
  border-radius:13px;padding:11px;}
.prayer-body{flex:1;display:flex;flex-direction:column;gap:2px;}

.radar-wrap{margin:-2px 0 4px;display:grid;place-items:center;}
.raters{display:flex;flex-direction:column;gap:11px;margin:6px 0 14px;}
.rater{display:flex;align-items:center;justify-content:space-between;}
.rater-name{display:flex;align-items:center;gap:8px;font-weight:700;font-size:14px;}
.dots{display:flex;gap:7px;}
.rate-dot{width:22px;height:22px;border-radius:50%;border:1.6px solid var(--line);background:#fff;cursor:pointer;
  transition:all .12s;}
.rate-dot.filled{border-color:transparent;}
.rate-dot:hover{transform:scale(1.1);}

.habit-week li{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:12px;}
.habit-week-head{display:flex;align-items:center;gap:9px;margin-bottom:10px;}
.habit-name{font-weight:700;font-size:14.5px;flex:1;}
.streak{display:inline-flex;align-items:center;gap:3px;color:var(--gold);font-weight:800;font-size:12.5px;}
.week-dots{display:flex;gap:6px;}
.wk{flex:1;height:34px;border-radius:10px;border:1.4px solid var(--line);background:#fff;color:var(--inkSoft);
  font-size:11px;font-weight:800;cursor:pointer;text-transform:uppercase;transition:all .12s;}
.wk.on{color:#fff;}
.wk.today{box-shadow:0 0 0 2px var(--goldSoft);}
.habit-add{display:flex;gap:8px;margin-top:12px;}

.money-summary{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:16px;
  box-shadow:0 8px 24px -20px rgba(58,46,69,.5);}
.sum-card{display:flex;align-items:center;justify-content:space-between;padding-bottom:12px;
  border-bottom:1px solid var(--line);margin-bottom:12px;}
.sum-card .numfield input{font-size:22px;font-weight:800;width:120px;text-align:right;font-family:'Fraunces',serif;}
.sum-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;text-align:center;}
.sum-grid>div{display:flex;flex-direction:column;gap:3px;}
.sum-grid strong{font-family:'Fraunces',serif;font-size:18px;}
.sum-grid .pos strong{color:#7A6147;}
.sum-grid .neg strong{color:var(--rose);}

.numfield{display:inline-flex;align-items:center;gap:2px;background:#fff;border:1px solid var(--line);
  border-radius:10px;padding:2px 8px;}
.numfield .prefix{color:var(--inkSoft);font-weight:700;}
.numfield input{border:none;background:transparent;width:62px;text-align:right;font-size:14px;font-weight:700;padding:5px 0;}
.numfield input:focus{outline:none;}

.pie-wrap{display:flex;align-items:center;gap:16px;flex-wrap:wrap;justify-content:center;}
.legend{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:6px;flex:1;min-width:150px;}
.legend li{display:flex;align-items:center;gap:8px;font-size:13.5px;}
.legend .muted{margin-left:auto;font-weight:800;}

.cat-list li,.goal-list li{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:12px;
  display:flex;flex-direction:column;gap:9px;}
.cat-top,.goal-top{display:flex;align-items:center;gap:8px;}
.cat-nums{display:flex;gap:10px;}
.cat-nums label{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--inkSoft);font-weight:800;flex:1;}
.cat-nums .numfield{flex:1;}
.row-list li{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:12px;
  display:grid;grid-template-columns:1fr auto;gap:8px 10px;align-items:center;}
.row-list li .plain-input.bold{grid-column:1;}
.row-list li .ghost-x{grid-row:1;grid-column:2;}
.row-list label{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--inkSoft);font-weight:800;}

/* devotional journey */
.year-toggle{display:flex;align-items:center;gap:10px;font-weight:800;font-size:14px;color:var(--ink);}
.year-toggle button{width:26px;height:26px;border-radius:8px;border:1px solid var(--line);background:#fff;cursor:pointer;color:var(--lilac);font-size:16px;line-height:1;}
.year-toggle button:disabled{opacity:.35;cursor:default;}
.journey-today{margin-bottom:14px;}
.journey-btn{display:flex;align-items:center;gap:9px;background:var(--lilacWash);border:1px solid var(--line);color:var(--ink);font-family:inherit;font-weight:700;font-size:14px;padding:11px 14px;border-radius:13px;cursor:pointer;width:100%;text-align:left;}
.journey-btn.on{background:var(--lilac);color:#fff;border-color:transparent;}
.journey-btn .check.small{width:20px;height:20px;border-radius:6px;border:1.6px solid var(--lilac);background:#fff;display:grid;place-items:center;color:#fff;flex:none;}
.journey-btn.on .check.small{background:#fff;border-color:#fff;color:var(--lilac);}
.journey-done{display:flex;align-items:center;gap:9px;background:#efe6d6;color:#6a4f38;font-weight:800;font-size:14px;padding:11px 14px;border-radius:13px;width:100%;}
.streak-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
.stat{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:12px 6px;text-align:center;display:flex;flex-direction:column;gap:3px;}
.stat-num{font-family:'Fraunces',serif;font-size:23px;font-weight:600;color:var(--lilac);display:inline-flex;align-items:center;justify-content:center;gap:3px;}
.stat-lbl{font-size:11px;color:var(--inkSoft);font-weight:700;}
.heatmap-scroll{overflow-x:auto;padding-bottom:4px;}
.heat-legend{display:flex;align-items:center;justify-content:flex-end;gap:5px;font-size:11px;color:var(--inkSoft);margin-top:4px;font-weight:700;}
.heat-legend i{width:11px;height:11px;border-radius:3px;display:inline-block;}
.compare-head{margin:18px 0 6px;font-weight:800;font-size:13px;color:var(--ink);}
.compare-legend{display:flex;gap:18px;justify-content:center;font-size:12px;color:var(--inkSoft);font-weight:700;margin-top:2px;}
.compare-legend i{width:11px;height:11px;border-radius:3px;display:inline-block;margin-right:6px;vertical-align:-1px;}

/* gratitude record */
.grat-list{list-style:none;margin:10px 0 0;padding:0;display:flex;flex-direction:column;gap:8px;}
.grat-list li{display:flex;align-items:center;gap:9px;background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:9px 11px;}
.grat-mark{color:var(--rose);display:inline-flex;flex:none;}
.grat-text{flex:1;font-size:14px;}
.grat-date{font-size:11px;color:var(--inkSoft);font-weight:700;flex:none;}

/* bible in a year */
.bible-prog{display:flex;flex-direction:column;gap:7px;margin-bottom:14px;}
.bible-meta{font-size:14px;font-weight:800;color:var(--lilac);}
.bible-meta .muted{font-weight:600;}
.bible-current{background:var(--lilacWash);border:1px solid var(--line);border-radius:14px;padding:14px;display:flex;flex-direction:column;gap:8px;}
.bible-day{font-size:11px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--gold);}
.bible-passage{font-family:'Fraunces',serif;font-size:18px;color:var(--ink);line-height:1.3;}
.bible-current .primary{align-self:flex-start;margin-top:2px;}
.bible-finished{display:inline-flex;align-items:center;gap:8px;background:#efe6d6;color:#6a4f38;font-weight:800;font-size:14px;padding:12px 14px;border-radius:13px;}
.bible-all{margin-top:12px;}
.bible-all summary{cursor:pointer;font-weight:800;font-size:13px;color:var(--lilac);padding:6px 0;list-style-position:inside;}
.bible-list{list-style:none;margin:8px 0 0;padding:0;max-height:300px;overflow-y:auto;display:flex;flex-direction:column;gap:6px;}
.bible-list li{display:flex;align-items:center;gap:9px;font-size:13px;padding:5px 2px;}
.bible-list li.read .bp{color:var(--inkSoft);text-decoration:line-through;}
.bible-list .bd{font-weight:800;color:var(--inkSoft);font-size:11px;width:46px;flex:none;}
.bible-list .bp{flex:1;}
.check.small{width:20px;height:20px;border-radius:6px;border:1.6px solid var(--lilac);background:#fff;display:grid;place-items:center;color:#fff;flex:none;cursor:pointer;}

/* money over time */
.hist-list{list-style:none;margin:14px 0 0;padding:0;display:flex;flex-direction:column;gap:8px;}
.hist-list li{display:flex;align-items:center;gap:10px;background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:10px 12px;flex-wrap:wrap;}
.hist-ym{font-weight:800;font-size:13px;flex:none;min-width:78px;}
.hist-cell{font-size:13px;font-weight:700;display:flex;flex-direction:column;}
.hist-cell i{font-style:normal;font-size:10px;font-weight:700;}
.hist-cell .pos{color:#5f8a55;}
.hist-cell .neg{color:var(--rose);}

/* study tab */
.study-banner{background:linear-gradient(135deg,#B5946A,#6e4f34);}
.verse-list{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:9px;}
.verse-list li{background:var(--paper);border:1px solid var(--line);border-radius:13px;padding:11px;}
.verse-top{display:flex;align-items:center;gap:9px;}
.verse-ref{flex:1;font-weight:800;color:var(--lilac);font-size:14px;}
.verse-list li.memorized .verse-ref{color:var(--sage);}
.reveal-btn{background:var(--lilacWash);border:none;color:var(--ink);font-family:inherit;font-weight:700;font-size:12px;padding:5px 11px;border-radius:9px;cursor:pointer;flex:none;}
.reveal-btn:hover{background:#e6d9c2;}
.verse-body{margin:10px 0 0;font-size:15px;line-height:1.55;font-style:italic;font-family:'Fraunces',serif;color:var(--ink);}
.two-col{display:flex;gap:8px;}
.two-col .plain-input{flex:1;}
.sermon-list{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:10px;}
.sermon-list li{background:var(--paper);border:1px solid var(--line);border-radius:13px;padding:12px;}
.sermon-head{display:flex;align-items:center;gap:10px;}
.sermon-title{flex:1;font-weight:600;font-size:15px;font-family:'Fraunces',serif;}
.sermon-meta{font-size:12.5px;color:var(--gold);font-weight:800;margin-top:3px;}
.sermon-notes{margin:8px 0 0;font-size:14px;line-height:1.55;white-space:pre-wrap;}

/* giving */
.giving-add{display:flex;gap:8px;align-items:center;margin-bottom:4px;}
.giving-add .numfield{flex:1;}
.giving-add select{padding:9px 10px;border:1px solid var(--line);border-radius:11px;font-family:inherit;font-size:14px;background:#fff;color:var(--ink);}
.giving-total{display:flex;align-items:center;justify-content:space-between;margin:12px 0 8px;}
.giving-total strong{font-family:'Fraunces',serif;font-size:23px;color:var(--lilac);}
.giving-chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:6px;}
.giving-chips .chip{background:var(--lilacWash);color:#6a4f38;font-weight:800;font-size:12px;padding:5px 11px;border-radius:99px;}
.giving-list{list-style:none;margin:10px 0 0;padding:0;display:flex;flex-direction:column;gap:7px;}
.giving-list li{display:flex;align-items:center;gap:10px;background:var(--paper);border:1px solid var(--line);border-radius:11px;padding:9px 11px;}
.giv-type{font-weight:800;font-size:13px;width:74px;flex:none;}
.giv-amt{flex:1;font-weight:700;}
.giv-date{flex:none;font-size:12px;}

/* money: paychecks + tithe */
.sum-hero{display:flex;align-items:flex-end;justify-content:space-between;gap:10px;padding-bottom:12px;border-bottom:1px solid var(--line);margin-bottom:12px;flex-wrap:wrap;}
.hero-num{font-family:'Fraunces',serif;font-size:30px;font-weight:600;color:var(--ink);display:block;line-height:1.1;margin-top:2px;}
.hero-split{font-size:12px;color:var(--inkSoft);font-weight:800;}
.who-toggle{display:flex;gap:8px;margin-bottom:10px;}
.who-toggle button{flex:1;padding:9px;border:1px solid var(--line);background:#fff;border-radius:11px;font-family:inherit;font-weight:800;font-size:13.5px;color:var(--inkSoft);cursor:pointer;}
.who-toggle button.on{background:var(--lilac);color:#fff;border-color:transparent;}
.pay-add{display:flex;gap:8px;align-items:center;}
.pay-add .numfield{flex:1;}
.date-input{padding:8px 10px;border:1px solid var(--line);border-radius:11px;font-family:inherit;font-size:13px;background:#fff;color:var(--ink);max-width:150px;}
.pay-hint{font-size:11.5px;color:var(--inkSoft);margin:8px 2px 12px;line-height:1.5;}
.tithe-card{background:var(--lilacWash);border-radius:14px;padding:13px 14px;margin-bottom:12px;}
.tithe-row{display:flex;align-items:center;justify-content:space-between;font-size:14px;font-weight:800;color:var(--ink);}
.tithe-row strong{font-family:'Fraunces',serif;font-size:19px;color:var(--lilac);}
.tithe-row.sub{font-size:12.5px;font-weight:700;color:var(--inkSoft);margin-top:5px;}
.tithe-btn{margin-top:11px;width:100%;justify-content:center;}
.pay-list{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:7px;}
.pay-list li{display:flex;align-items:center;gap:9px;background:var(--paper);border:1px solid var(--line);border-radius:11px;padding:9px 11px;}
.pay-who{font-weight:800;font-size:13px;width:62px;flex:none;}
.pay-amt{font-weight:800;font-size:14px;}
.pay-tithe{flex:1;font-size:11.5px;color:var(--gold);font-weight:800;}
.pay-date{flex:none;font-size:12px;}

/* balance: moments with hubby */
.moment-list{list-style:none;margin:12px 0 0;padding:0;display:flex;flex-direction:column;gap:8px;}
.moment-list li{display:flex;align-items:center;gap:9px;background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:9px 11px;font-size:14px;}
.moment-heart{color:var(--rose);display:inline-flex;flex:none;}
.moment-note{flex:1;}
.moment-date{font-size:11px;color:var(--inkSoft);font-weight:800;flex:none;}

/* editable greeting name */
.name-btn{font-family:'Fraunces',Georgia,serif;font-weight:600;font-size:inherit;color:var(--ink);background:none;border:none;padding:0;cursor:pointer;border-bottom:1.5px dashed var(--lilacSoft);line-height:1;}
.name-btn:hover{color:var(--lilac);}
.name-input{font-family:'Fraunces',Georgia,serif;font-weight:600;font-size:inherit;color:var(--ink);background:var(--card);border:none;border-bottom:2px solid var(--lilac);padding:0 2px;width:8ch;max-width:60vw;outline:none;}

.tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:540px;
  background:rgba(255,255,255,.92);backdrop-filter:blur(12px);border-top:1px solid var(--line);
  display:flex;padding:8px 8px calc(8px + env(safe-area-inset-bottom));}
.tab{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px;
  color:var(--inkSoft);cursor:pointer;font-family:inherit;font-size:11px;font-weight:800;border-radius:12px;transition:all .15s;}
.tab.active{color:var(--lilac);background:var(--lilacWash);}

/* auth */
.auth-wrap{max-width:400px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;justify-content:center;
  gap:18px;padding:24px;}
.auth-card{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:26px 22px;
  box-shadow:0 18px 50px -30px var(--lilac);display:flex;flex-direction:column;gap:14px;}
.auth-card h2{font-size:22px;}
.auth-card input{padding:12px 14px;border:1px solid var(--line);border-radius:12px;font-size:15px;font-family:inherit;background:#fff;}
.auth-card .primary{align-self:stretch;justify-content:center;padding:13px;font-size:15px;}
.auth-toggle{background:none;border:none;color:var(--lilac);font-weight:800;font-size:13px;cursor:pointer;font-family:inherit;}
.auth-err{color:#A85D3E;font-size:13px;font-weight:700;}
.auth-note{font-size:12.5px;color:var(--inkSoft);text-align:center;line-height:1.5;}
.intro-mark{width:54px;height:54px;border-radius:18px;display:grid;place-items:center;color:#fff;margin:0 auto;
  background:linear-gradient(140deg,var(--lilac),var(--gold));box-shadow:0 10px 24px -10px var(--lilac);}

.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;min-height:70vh;}
.spinner{width:34px;height:34px;border-radius:50%;border:3px solid var(--lilacWash);border-top-color:var(--lilac);
  animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}
button:focus-visible,input:focus-visible,textarea:focus-visible,select:focus-visible{outline:2px solid var(--lilac);outline-offset:2px;}
.config-warn{max-width:480px;margin:60px auto;padding:24px;background:#fff;border:1px solid var(--line);
  border-radius:18px;line-height:1.6;font-size:14px;}
.config-warn code{background:var(--lilacWash);padding:2px 6px;border-radius:6px;font-size:13px;}
